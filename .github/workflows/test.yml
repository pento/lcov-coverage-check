name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run test suite
        run: test/run-tests.sh

  integration:
    name: Integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Summary-only mode
        uses: ./
        with:
          lcov-file: test/fixtures/current.lcov.info
